name: CI — Autotests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Ruff Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff on src/
        run: ruff check src/ --line-length 120

  test:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: NLTK data
        run: python -m nltk.downloader punkt averaged_perceptron_tagger stopwords vader_lexicon

      - name: Run pytest
        env:
          CP2_FAST: "1"
        run: python -m pytest -q
