services:
  - type: web
    name: news-title-virality-api
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python -m nltk.downloader punkt averaged_perceptron_tagger stopwords vader_lexicon
    startCommand: uvicorn src.api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: NLTK_DATA
        value: /opt/render/project/src/nltk_data
    healthCheckPath: /health
    plan: free
